<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="https://icones.pro/wp-content/uploads/2021/02/instagram-icone-rouge.png">
    <link rel="stylesheet" href="./style.css">
    <title>POSTAR</title>
</head>
<body>
    <div id="content">
        <form id="form">
            <h2>CRIE UM POST</h2> <br>
            <div id="picture">
                <input type="file" name="file" id="file" accept="image/*" required>
                <label for="file" id="file-label">
                    <img id="preview" src="https://icones.pro/wp-content/uploads/2021/02/icono-de-camara-gris.png" alt="Imagem padrão">
                </label>
            </div> <br>
            <textarea name="descricao" id="descricao" cols="30" rows="10" placeholder="DESCRIÇÃO DO POST" required></textarea> <br>
            <input type="submit" value="PUBLICAR">
        </form>
    </div>
    <script type="module" src="./script.js"></script>
    <script type="module" src="./requisicao.js"></script>
</body>
</html>
